name: Build PHP Binaries

on:
  workflow_dispatch:
    inputs:
      tagname:
        description: 'Tag name for release (e.g., pm5-php-8.3)'
        required: true
        default: 'pm5-php-8.3'
      php_version:
        description: 'PHP version (e.g., 8.3)'
        required: true
        default: '8.3'
      commithash:
        description: 'Specific commit hash from pmmp/php-build-scripts'
        required: false
        default: 'stable'
      createRelease:
        description: 'Publish GitHub release?'
        required: true
        default: 'yes'
        type: choice
        options: ['yes', 'no']

  workflow_call:
    inputs:
      tagname:
        required: true
        type: string
      php_version:
        required: true
        type: string
      commithash:
        required: false
        type: string
        default: 'stable'
      createRelease:
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  build:
    name: Build PHP for Android (aarch64)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Init directories
        run: mkdir -p {aarch64-linux-musl,output}

      - name: Prepare compile.sh download cache
        id: download-cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/download_cache
          key: php-cache-${{ inputs.php_version }}
          restore-keys: php-cache-${{ inputs.php_version }}

      - name: Cache toolchain
        id: toolchain
        uses: actions/cache@v4
        with:
          path: aarch64-linux-musl
          key: toolchain-cache-v1
          restore-keys: toolchain-cache-v1

      - name: Install toolchain if not cached
        if: ${{ steps.toolchain.outputs.cache-hit != 'true' }}
        run: |
          mkdir -p aarch64-linux-musl
          cd aarch64-linux-musl
          curl -sSLf -o toolchain.tar.xz "https://github.com/DaisukeDaisuke/musl-cross-make/releases/latest/download/aarch64-linux-musl.tar.xz"
          tar -xf toolchain.tar.xz
          rm toolchain.tar.xz

      - name: Add toolchain to path
        run: echo "${{ github.workspace }}/aarch64-linux-musl/bin" >> "$GITHUB_PATH"

      - name: Checkout php-build-scripts
        uses: actions/checkout@v4
        with:
          repository: pmmp/php-build-scripts
          path: php-build-scripts
          ref: ${{ inputs.commithash }}

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            re2c libtool libtool-bin zlib1g-dev \
            libcurl4-openssl-dev libxml2-dev \
            libyaml-dev libgmp-dev libzip-dev libssl-dev

      - name: Compile PHP
        working-directory: php-build-scripts
        run: |
          ./compile.sh -t android-aarch64 -x -j$(nproc) -c ${{ github.workspace }}/download_cache -z ${{ inputs.php_version }} -D -g -P5
          [ -f bin/php7/bin/php ] || exit 1

      - name: Prepare artifacts
        run: cp php-build-scripts/bin/php7/bin/{php,php.ini} output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-php-build
          path: output/*
          retention-days: 1

  release:
    name: Create Release
    needs: build
    if: ${{ inputs.createRelease == 'yes' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Get current date
        id: date
        run: echo "date=$(date -u +'%d %b %Y at %H:%M:%S %Z')" >> $GITHUB_OUTPUT

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-php-build
          path: release

      - name: Pack files and generate checksums
        working-directory: release
        run: |
          zip -9 php-android-${{ inputs.tagname }}.zip php php.ini
          tar -czf php-android-${{ inputs.tagname }}.tar.gz php php.ini
          sha256sum php php.ini *.zip *.gz > checksums.sha256

      - name: Sign checksums with Cosign
        working-directory: release
        run: |
          curl -sSLf https://github.com/sigstore/cosign/releases/latest/download/cosign-linux-amd64 -o cosign
          chmod +x cosign
          ./cosign sign-blob --yes \
            --output-signature checksums.sig \
            --output-certificate checksums.cert \
            checksums.sha256

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tagname }}
          name: "${{ inputs.tagname }} (aarch64)"
          body: |
            Pre-built PHP binary for Android ARM64 devices
            Built by: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Last updated on **${{ steps.date.outputs.date }}**

            ### Version Information
            - PHP Version: ${{ inputs.php_version }}
            - Target: android-aarch64

            ### Verification
            This release includes SHA256 hashes (`checksums.sha256`), a signature (`checksums.sig`), and a signing certificate (`checksums.cert`).

            You can read the verification instructions here:
            [Verification Guide](https://github.com/ItzxDwi/AndroidPHP/blob/stable/VERIFICATION.md)

          files: release/*
          target_commitish: ${{ github.sha }}
          draft: false
          prerelease: ${{ contains(inputs.tagname, 'preview') }}
