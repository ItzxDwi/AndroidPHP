name: Auto Trigger on PHP-Binaries Release

on:
  schedule:
    - cron: '0 0 */2 * *'  # Every 48 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-latest-release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.set-tag.outputs.tag_name }}
      base_version: ${{ steps.set-tag.outputs.base_version }}
      new_release: ${{ steps.set-tag.outputs.new_release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore last release info from cache
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: latest-release
          key: php-binaries-last-release-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            php-binaries-last-release-

      - name: Get latest release info and compare
        id: set-tag
        run: |
          # Get the latest release from the static pm5-latest tag
          API_JSON=$(curl -s https://api.github.com/repos/pmmp/PHP-Binaries/releases/tags/pm5-latest)
          RELEASE_ID=$(echo "$API_JSON" | jq -r .id)
          RELEASE_NAME=$(echo "$API_JSON" | jq -r .name)
          PUBLISHED_AT=$(echo "$API_JSON" | jq -r .published_at)
          
          # Get the most recent asset update time
          ASSETS_UPDATED_AT=$(echo "$API_JSON" | jq -r '[.assets[].updated_at] | max')
          
          # Create a unique fingerprint of the release assets
          RELEASE_FINGERPRINT=$(echo "$API_JSON" | jq -r '.assets | map(.digest + .updated_at) | join(",")' | sha256sum | awk '{print $1}')

          echo "Release ID: $RELEASE_ID"
          echo "Release name: $RELEASE_NAME"
          echo "Published at: $PUBLISHED_AT"
          echo "Latest asset update: $ASSETS_UPDATED_AT"
          echo "Release fingerprint: $RELEASE_FINGERPRINT"

          # Extract PHP version from asset names only
          echo "Extracting PHP version from asset names..."
          BASE_VERSION=$(echo "$API_JSON" | jq -r '.assets[] | .name' | grep -oE 'PHP-[0-9]+\.[0-9]+' | head -1 | cut -d'-' -f2)

          # Validate we got a version
          if [ -z "$BASE_VERSION" ] || ! echo "$BASE_VERSION" | grep -qE '^[0-9]+\.[0-9]+$'; then
              echo "ERROR: Could not extract PHP version from asset names"
              echo "Available asset names:"
              echo "$API_JSON" | jq -r '.assets[] | .name'
              exit 1
          fi

          echo "Base PHP version: $BASE_VERSION"

          # Output to GitHub
          echo "tag_name=pm5-latest" >> $GITHUB_OUTPUT
          echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT

          # Compare with cached release info
          mkdir -p latest-release
          RELEASE_INFO_FILE="latest-release/.last-release"
          
          if [ ! -f "$RELEASE_INFO_FILE" ]; then
            echo "First run or no cache found"
            echo "$RELEASE_FINGERPRINT|$ASSETS_UPDATED_AT" > "$RELEASE_INFO_FILE"
            echo "new_release=true" >> $GITHUB_OUTPUT
          else
            LAST_INFO=$(cat "$RELEASE_INFO_FILE")
            LAST_FINGERPRINT=$(echo "$LAST_INFO" | cut -d'|' -f1)
            LAST_UPDATED_AT=$(echo "$LAST_INFO" | cut -d'|' -f2)
            
            if [ "$RELEASE_FINGERPRINT" != "$LAST_FINGERPRINT" ] || [ "$ASSETS_UPDATED_AT" != "$LAST_UPDATED_AT" ]; then
              echo "New release detected:"
              echo "- Fingerprint changed: $LAST_FINGERPRINT -> $RELEASE_FINGERPRINT"
              echo "- Or assets updated: $LAST_UPDATED_AT -> $ASSETS_UPDATED_AT"
              echo "$RELEASE_FINGERPRINT|$ASSETS_UPDATED_AT" > "$RELEASE_INFO_FILE"
              echo "new_release=true" >> $GITHUB_OUTPUT
            else
              echo "No new release detected"
              echo "new_release=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Save updated release info to cache
        if: ${{ steps.set-tag.outputs.new_release == 'true' }}
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: latest-release
          key: php-binaries-last-release-${{ github.run_id }}-${{ github.run_attempt }}

  run-build:
    needs: check-latest-release
    if: ${{ needs.check-latest-release.outputs.new_release == 'true' }}
    uses: ./.github/workflows/manual-release.yml
    with:
      tagname: ${{ needs.check-latest-release.outputs.tag_name }}
      base_version: ${{ needs.check-latest-release.outputs.base_version }}
      commithash: "none"
      createRelease: "yes"
    secrets: inherit
