name: Auto trigger release

on:
  schedule:
    - cron: '0 0 */2 * *'  # Every 48 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-latest-release:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.check-release.outputs.tag_name }}
      php_version: ${{ steps.check-release.outputs.php_version }}
      new_release: ${{ steps.check-release.outputs.new_release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get cached release info
        id: cache
        uses: actions/cache@v4
        with:
          path: .release-cache
          key: php-binaries-cache-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            php-binaries-cache-

      - name: Check for new release
        id: check-release
        run: |
          # Get latest release info
          API_JSON=$(curl -s https://api.github.com/repos/pmmp/PHP-Binaries/releases/tags/pm5-latest)
          CURRENT_FINGERPRINT=$(echo "$API_JSON" | jq -r '.assets | map(.digest + .updated_at) | join(",")' | sha256sum | awk '{print $1}')

          # Extract PHP version
          PHP_VERSION=$(echo "$API_JSON" | jq -r '.assets[0].name' | grep -oE 'PHP-[0-9]+\.[0-9]+' | head -1 | cut -d'-' -f2)
          if [ -z "$PHP_VERSION" ]; then
            echo "ERROR: Could not extract PHP version"
            exit 1
          fi

          # Check cache
          if [ -f ".release-cache/last-fingerprint" ]; then
            LAST_FINGERPRINT=$(cat ".release-cache/last-fingerprint")
            if [ "$CURRENT_FINGERPRINT" = "$LAST_FINGERPRINT" ]; then
              echo "No new release detected"
              echo "new_release=false" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          # New release detected
          mkdir -p .release-cache
          echo "$CURRENT_FINGERPRINT" > ".release-cache/last-fingerprint"
          echo "tag_name=pm5-latest" >> $GITHUB_OUTPUT
          echo "php_version=$PHP_VERSION" >> $GITHUB_OUTPUT
          echo "new_release=true" >> $GITHUB_OUTPUT

      - name: Update cache
        if: ${{ steps.check-release.outputs.new_release == 'true' }}
        uses: actions/cache/save@v4
        continue-on-error: true
        with:
          path: .release-cache
          key: php-binaries-cache-${{ github.run_id }}-${{ github.run_attempt }}

  run-build:
    needs: check-latest-release
    if: ${{ needs.check-latest-release.outputs.new_release == 'true' }}
    uses: ./.github/workflows/manual-release.yml
    with:
      tagname: ${{ needs.check-latest-release.outputs.tag_name }}
      php_version: ${{ needs.check-latest-release.outputs.php_version }}
      createRelease: "yes"
    secrets: inherit
